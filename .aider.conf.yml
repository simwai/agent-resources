read:
  - ./docs
  - ./AGENT_COMMIT.agent.md
  - ./AGENT_PROMPT.agent.md

chat-language: "English"

git: true
auto-commits: true
dirty-commits: false

commit: true
commit-prompt: "<commit_style_instructions></commit_style_instructions>"

model: "openrouter/minimax/minimax-m2.5:free"
weak-model: "openrouter/minimax/minimax-m2.5:free"

lint-cmd: ["npx tsc && npm run format"]
auto-lint: true

# test-cmd: "npm run test"
# auto-test: true

code-theme: "github-dark"
